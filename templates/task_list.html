{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h4 mb-0 fw-bold">All Tasks</h2>
</div>

<div class="table-wrapper">
  <table class="table table-hover border-0">
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Due Date</th>
        <th class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for task in tasks %}
      <tr>
        <td class="fw-medium">{{ task.title }}</td>
        <td>
            <span class="badge bg-light text-dark border px-2 py-1">{{ task.get_status_display }}</span>
        </td>
        <td>
            <span class="badge bg-light text-dark border px-2 py-1">{{ task.get_priority_display }}</span>
        </td>
        <td class="text-muted">{{ task.due_date|default:"-" }}</td>
        <td class="text-end">
          <a href="{% url 'task_update' task.pk %}"
             class="btn btn-sm btn-light border me-1 rounded-3 px-3">Edit</a>
          <a href="{% url 'task_delete' task.pk %}"
             class="btn btn-sm btn-outline-danger rounded-3 px-3">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}

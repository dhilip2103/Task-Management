{% extends 'base.html' %}
{% block content %}
<div class="theme-card text-center mx-auto mt-5" style="max-width:450px;">
    <h4 class="mb-3 text-dark">Delete "{{ task.title }}"?</h4>
    <p class="text-muted mb-4">This action cannot be undone. Are you sure you want to proceed?</p>
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex justify-content-center gap-3 mt-2">
          <a href="{% url 'task_list' %}" class="btn btn-light border px-4 rounded-3">Cancel</a>
          <button type="submit" class="btn btn-danger px-4 rounded-3 shadow-sm">Yes, Delete</button>
      </div>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<h2>{% if task %}Edit{% else %}New{% endif %} Task</h2>
<form method="POST">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Title</label>
    {{ form.title }}
    {% if form.title.errors %}
      <div class="text-danger">{{ form.title.errors }}</div>
    {% endif %}
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    {{ form.description }}
  </div>
  <div class="row">
    <div class="col"><label>Status</label>{{ form.status }}</div>
    <div class="col"><label>Priority</label>{{ form.priority }}</div>
    <div class="col"><label>Due Date</label>{{ form.due_date }}</div>
  </div>
  <div class="mt-3">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}

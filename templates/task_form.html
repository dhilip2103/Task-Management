{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="theme-card">
      <h3 class="mb-4">{% if task %}Edit{% else %}New{% endif %} Task</h3>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label">Title</label>
          {{ form.title }}
          {% if form.title.errors %}
            <div class="text-danger mt-1 small">{{ form.title.errors }}</div>
          {% endif %}
        </div>
        <div class="mb-4">
          <label class="form-label">Description</label>
          {{ form.description }}
        </div>
        <div class="row mb-4">
          <div class="col-md-4 mb-3 mb-md-0">
              <label class="form-label">Status</label>
              {{ form.status }}
          </div>
          <div class="col-md-4 mb-3 mb-md-0">
              <label class="form-label">Priority</label>
              {{ form.priority }}
          </div>
          <div class="col-md-4">
              <label class="form-label">Due Date</label>
              {{ form.due_date }}
          </div>
        </div>
        <div class="mt-5 pt-3 border-top d-flex gap-2">
          <button type="submit" class="btn btn-custom-primary px-4 py-2">Save Task</button>
          <a href="{% url 'task_list' %}" class="btn btn-light border px-4 py-2 rounded-3">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
